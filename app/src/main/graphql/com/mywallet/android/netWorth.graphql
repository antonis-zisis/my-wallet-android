query GetNetWorthSnapshots($page: Int) {
  netWorthSnapshots(page: $page) {
    items {
      id
      title
      snapshotDate
      totalAssets
      totalLiabilities
      netWorth
      previousSnapshot {
        netWorth
      }
      createdAt
    }
    totalCount
  }
}

query GetNetWorthSnapshot($id: ID!) {
  netWorthSnapshot(id: $id) {
    id
    title
    snapshotDate
    totalAssets
    totalLiabilities
    netWorth
    previousSnapshot {
      totalAssets
      totalLiabilities
      netWorth
      entries {
        type
        label
        amount
      }
    }
    entries {
      id
      type
      label
      amount
      category
    }
    createdAt
    updatedAt
  }
}

mutation CreateNetWorthSnapshot($input: CreateNetWorthSnapshotInput!) {
  createNetWorthSnapshot(input: $input) {
    id
    title
    snapshotDate
    totalAssets
    totalLiabilities
    netWorth
    createdAt
  }
}

mutation UpdateNetWorthSnapshot($id: ID!, $input: UpdateNetWorthSnapshotInput!) {
  updateNetWorthSnapshot(id: $id, input: $input) {
    id
    title
    snapshotDate
    totalAssets
    totalLiabilities
    netWorth
    updatedAt
  }
}

mutation DeleteNetWorthSnapshot($id: ID!) {
  deleteNetWorthSnapshot(id: $id)
}
